<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar CNPJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="header-hero">
      <div class="header-content">
        <div class="header-badge">🔍 Inteligência de Domínios</div>
        <h1 class="header-title">Radar CNPJ</h1>
        <p class="header-subtitle">Descubra o CNPJ, infraestrutura de email e dados da empresa por domínio</p>
      </div>
    </header>

    <main class="container">
      <div class="search-section">
        <form id="lookup-form" class="search-form">
          <div class="input-group">
            <input id="domain-input" type="text" placeholder="Exemplo: google.com" required>
            <button type="submit" class="btn-primary">Pesquisar</button>
          </div>
        </form>
        <label class="btn-secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
            <polyline points="13 2 13 9 20 9"></polyline>
          </svg>
          Importar CSV/XLSX
          <input id="csv-upload" type="file" accept=".csv,.xlsx" hidden>
        </label>
      </div>

      <div id="status-panel" class="status-banner" style="display: none;">
        <span id="status-text"></span>
        <div id="progress-container" class="progress-bar" style="display: none;">
          <div id="progress-fill"></div>
        </div>
      </div>

      <div id="results-container" style="display: none;" class="results-grid">
        <div class="result-card domain-card">
          <div class="result-header">
            <h2>Domínio</h2>
            <div class="icon-badge">🌐</div>
          </div>
          <p id="domain-name" class="domain-value">-</p>
          <p id="organization-name" class="organization-value">Sem identificação</p>
        </div>

        <div class="result-card cnpj-card">
          <div class="result-header">
            <h2>CNPJ</h2>
            <div class="icon-badge">📋</div>
          </div>
          <div id="cnpj-display" class="result-items">
            <p class="empty-state">Não encontrado</p>
          </div>
        </div>

        <div class="result-card email-card">
          <div class="result-header">
            <h2>Infraestrutura de Email</h2>
            <div class="icon-badge">✉️</div>
          </div>
          <div id="mx-display" class="result-items">
            <p class="empty-state">Nenhum registro</p>
          </div>
        </div>
      </div>

      <template id="cnpj-card">
        <div class="item-card">
          <div class="item-cnpj" data-cnpj></div>
          <div class="item-info">
            <p class="item-company" data-company></p>
            <p class="item-meta" data-meta></p>
          </div>
        </div>
      </template>

      <template id="mx-card">
        <div class="item-card">
          <div class="item-provider">
            <strong data-provider></strong>
          </div>
          <p class="item-meta" data-details></p>
        </div>
      </template>

      <template id="batch-item">
        <div class="batch-card">
          <div class="batch-top">
            <span class="batch-domain" data-domain></span>
            <span class="batch-badge" data-status></span>
          </div>
          <div class="batch-data">
            <div class="batch-field">
              <span class="batch-label">CNPJ</span>
              <span class="batch-value" data-cnpj>-</span>
            </div>
            <div class="batch-field">
              <span class="batch-label">Empresa</span>
              <span class="batch-value" data-company>-</span>
            </div>
            <div class="batch-field">
              <span class="batch-label">Email</span>
              <span class="batch-value" data-email>-</span>
            </div>
          </div>
        </div>
      </template>

      <div id="batch-results-container" style="display: none;">
        <h2 class="batch-title">Resultados da Importação</h2>
        <div id="batch-results" class="batch-grid"></div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
